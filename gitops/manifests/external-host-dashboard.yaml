apiVersion: v1
kind: ConfigMap
metadata:
  name: external-host-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  external-host-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "概要",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "dtdurations"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Uptime",
          "type": "stat",
          "targets": [
            {
              "expr": "time() - node_boot_time_seconds{job=\"external-node\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "CPU 使用率",
          "type": "stat",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{job=\"external-node\",mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "メモリ使用率",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 - (node_memory_MemAvailable_bytes{job=\"external-node\"} / node_memory_MemTotal_bytes{job=\"external-node\"} * 100)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "ディスク使用率 (/)",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 - (node_filesystem_avail_bytes{job=\"external-node\",mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{job=\"external-node\",mountpoint=\"/\",fstype!=\"tmpfs\"} * 100)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "CPU & メモリ",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" }
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "title": "CPU 使用率",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{job=\"external-node\",mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU使用率",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" }
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 6,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "title": "メモリ使用率",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 - (node_memory_MemAvailable_bytes{job=\"external-node\"} / node_memory_MemTotal_bytes{job=\"external-node\"} * 100)",
              "legendFormat": "メモリ使用率",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "ネットワーク",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" }
              },
              "unit": "Bps"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "送信.*" },
                "properties": [
                  { "id": "custom.transform", "value": "negative-Y" }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "title": "ネットワーク I/O",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{job=\"external-node\",device!~\"lo|veth.*|docker.*|br-.*\"}[5m])",
              "legendFormat": "受信 {{device}}",
              "refId": "A"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{job=\"external-node\",device!~\"lo|veth.*|docker.*|br-.*\"}[5m])",
              "legendFormat": "送信 {{device}}",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "systemd サービス",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 24 },
          "id": 8,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Failed Units",
          "type": "stat",
          "targets": [
            {
              "expr": "count(systemd_unit_state{job=\"external-systemd\",state=\"failed\"} == 1) or vector(0)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "State" },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      { "options": { "1": { "text": "active", "color": "green" }, "0": { "text": "inactive", "color": "red" } }, "type": "value" }
                    ]
                  },
                  { "id": "custom.cellOptions", "value": { "type": "color-background" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 24 },
          "id": 9,
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "State", "desc": false }],
            "footer": { "show": false }
          },
          "title": "systemd サービス一覧",
          "type": "table",
          "targets": [
            {
              "expr": "systemd_unit_state{job=\"external-systemd\",state=\"active\",type=\"service\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "state": true,
                  "type": true
                },
                "renameByName": {
                  "name": "Unit",
                  "Value": "State"
                }
              }
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "id": 104,
          "title": "ユーザー タイマー (systemd --user)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 33 },
          "id": 10,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Failed Units (user)",
          "type": "stat",
          "targets": [
            {
              "expr": "count(systemd_unit_state{job=\"external-systemd-user\",state=\"failed\"} == 1) or vector(0)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "最終実行" },
                "properties": [
                  { "id": "unit", "value": "dateTimeFromNow" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "State" },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      { "options": { "1": { "text": "active", "color": "green" }, "0": { "text": "inactive", "color": "red" } }, "type": "value" }
                    ]
                  },
                  { "id": "custom.cellOptions", "value": { "type": "color-background" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 33 },
          "id": 11,
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Timer", "desc": false }],
            "footer": { "show": false }
          },
          "title": "ユーザータイマー一覧",
          "type": "table",
          "targets": [
            {
              "expr": "systemd_unit_state{job=\"external-systemd-user\",state=\"active\",type=\"timer\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "state": true,
                  "type": true
                },
                "renameByName": {
                  "name": "Timer",
                  "Value": "State"
                }
              }
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "最終実行からの経過" },
                "properties": [
                  { "id": "unit", "value": "s" },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 86400 },
                        { "color": "red", "value": 172800 }
                      ]
                    }
                  },
                  { "id": "custom.cellOptions", "value": { "type": "color-background" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 41 },
          "id": 12,
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "最終実行からの経過", "desc": true }],
            "footer": { "show": false }
          },
          "title": "タイマー最終実行",
          "type": "table",
          "targets": [
            {
              "expr": "time() - systemd_timer_last_trigger_seconds{job=\"external-systemd-user\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true
                },
                "renameByName": {
                  "name": "Timer",
                  "Value": "最終実行からの経過"
                }
              }
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["external", "node-exporter", "systemd"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "Asia/Tokyo",
      "title": "External Host Monitoring",
      "uid": "external-host-monitoring",
      "version": 1
    }
